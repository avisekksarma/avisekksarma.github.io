<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
    (function () {
        var savedTheme = null;
        var prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;

        try {
            savedTheme = localStorage.getItem("site-theme");
        } catch (error) {
            savedTheme = null;
        }

        var theme = savedTheme || (prefersLight ? "light" : "dark");

        document.documentElement.setAttribute("data-theme", theme);
    })();
</script>
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
{% include head-custom.html %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
{% seo %}
</head>

<body>

    <header>
        <div class="container">
            {% include navbar.html %}
        </div>
    </header>

    <div class="container">
        <section id="main_content">
            {{ content }}
        </section>
    </div>
    <script>
        (function () {
            var toggle = document.querySelector("[data-theme-toggle]");
            var icon = toggle ? toggle.querySelector("i") : null;

            function setTheme(theme) {
                document.documentElement.setAttribute("data-theme", theme);

                try {
                    localStorage.setItem("site-theme", theme);
                } catch (error) {
                    // Some privacy modes block localStorage; the current page can still switch themes.
                }

                if (!toggle || !icon) {
                    return;
                }

                var isLight = theme === "light";
                toggle.setAttribute("aria-label", isLight ? "Switch to dark theme" : "Switch to light theme");
                toggle.setAttribute("title", isLight ? "Switch to dark theme" : "Switch to light theme");
                icon.className = isLight ? "fa-solid fa-moon" : "fa-solid fa-sun";
            }

            setTheme(document.documentElement.getAttribute("data-theme") || "dark");

            if (toggle) {
                toggle.addEventListener("click", function () {
                    var currentTheme = document.documentElement.getAttribute("data-theme");
                    setTheme(currentTheme === "light" ? "dark" : "light");
                });
            }
        })();
    </script>
    {% if page.mermaid %}
    <script type="module">
        import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

        document.querySelectorAll("pre > code.language-mermaid").forEach((codeBlock) => {
            const diagram = document.createElement("div");
            diagram.className = "mermaid";
            diagram.textContent = codeBlock.textContent;
            codeBlock.parentElement.replaceWith(diagram);
        });

        const theme = document.documentElement.getAttribute("data-theme") === "light" ? "default" : "dark";

        mermaid.initialize({ startOnLoad: false, theme });
        await mermaid.run();
    </script>
    {% endif %}
</body>

</html>
